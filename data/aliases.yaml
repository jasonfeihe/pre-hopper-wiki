## Canonical Aliases
## Maps canonical terms to known aliases for search and normalization.
## Format: canonical_term: [alias1, alias2, ...]
##
## Matching in query.py is case-insensitive. These let a user type a device
## name (T4), a microarchitecture (Turing), or a dotted instruction form
## (mma.sync) and still hit the canonical tag used in frontmatter.

# Architecture names → canonical sm-tags
sm75:
  - Turing
  - turing
  - T4
  - "Tesla T4"
  - "SM75"
  - sm_75
  - "compute capability 7.5"

sm86:
  - Ampere
  - ampere
  - A10
  - "NVIDIA A10"
  - "SM86"
  - sm_86
  - "compute capability 8.6"

sm89:
  - "Ada Lovelace"
  - Ada
  - ada
  - lovelace
  - L20
  - L40
  - "NVIDIA L20"
  - "NVIDIA L40"
  - "SM89"
  - sm_89
  - "compute capability 8.9"

