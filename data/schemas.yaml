## data/version-claims.yaml registry. A stub (`claims: []`) is valid; entries
## are added when a page makes a tool-version-dependent capability claim.
version-claims-registry:
  required:
    - claims
  claim_schema:
    required:
      - id
      - tool
      - claim_valid_for
      - last_verified_release
      - last_verified_at
      - applies_to
      - source_ids
    optional:
      - notes
    constraints:
      tool: [triton, cutlass, cuda, ptx, python]
      applies_to_required_min: 1
      source_ids_required_min: 1
      id_prefix: vs-

## data/refresh-cutoff.yaml. Single-field record of the incremental-update
## baseline date. See references/incremental-updates.md for semantics.
refresh-cutoff:
  required:
    - cutoff_date
  optional:
    - notes
