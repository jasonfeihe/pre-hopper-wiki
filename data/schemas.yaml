## Page-Type Schemas — Pre-Hopper Kernel Wiki
## Defines required and optional fields per page type.
## Consumed by scripts/validate.py
##
## Design lineage: the page-type taxonomy and id-prefix conventions mirror the
## reference knowledge base (~/rd/auto-cuda/KernelWiki) for architectural
## parity, but this schema is original and pre-Hopper-scoped. Notably:
##   * No page type requires a `blackwell_relevance` field.
##   * Wiki page types accept an OPTIONAL neutral `scope_relevance` field
##     (free-text justification of why a page belongs in this KB's scope).
##   * Operational/ingestion page types (PR-skip audits, asset-bundle
##     provenance, core-PR ledgers) are intentionally omitted from this loop.

source-doc:
  required:
    - id
    - title
    - url
    - source_category
    - architectures
    - tags
    - retrieved_at
  optional:
    - author
    - description
    - scope_relevance
  constraints:
    id_prefix: doc-
    source_category: [official-doc, paper]

source-blog:
  required:
    - id
    - title
    - author
    - url
    - source_category
    - architectures
    - tags
    - retrieved_at
  optional:
    - description
    - scope_relevance
  constraints:
    id_prefix: blog-
    source_category: [benchmark-blog, community-note]

source-pr:
  required:
    - id
    - repo
    - pr
    - title
    - author
    - date
    - url
    - source_category
    - architectures
    - tags
    - captured_at
    - status
  optional:
    - merge_sha
    - description
    - inclusion_reason
    - techniques
    - hardware_features
    - kernel_types
    - languages
    - scope_relevance
  constraints:
    id_prefix: pr-
    source_category: upstream-code
    status: [open, merged, closed]
    merge_sha_required_when: "status == merged"

